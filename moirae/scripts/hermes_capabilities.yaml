# Hermes capabilities conversation demo
# Run with: python -m moirae moirae/scripts/hermes_capabilities.yaml -o hermes_capabilities.mp4
# Preview: python -m moirae moirae/scripts/hermes_capabilities.yaml --play

title: "Hermes — It Can Now"
skin: "default"
output:
  width: 2560
  height: 1440
  final_width: 1280
  final_height: 720
  fps: 30
  font_size: 22
  font_family: "Menlo"
  bg_image: "/Users/peteromalley/Desktop/sddefault (2).jpg"
  bg_opacity: 0.85
  bg_color: "#fdf1de"

typing_speed: 0.02
pause_between: 0.6

scenes:
  # ── Launch ──────────────────────────────────────────────
  - action: clear

  - action: type_command
    prefix: "~ $ "
    command: "hermes"

  - action: pause
    duration: 0.3

  - action: banner
    model: "Claude Opus 5"
    context: "128K"
    session_id: "a7c3e9f1"
    tools_count: 24
    skills_count: 42

  - action: pause
    duration: 1.0

  # ── Zoom in on the top after banner ────────────────────
  - action: camera
    zoom: 2.0
    x: 0.2
    y: 0.13
    duration: 0.8
    ease: "ease-in-out"

  # ── Exchanges 1-4: gradually zoom in ───────────────────

  - user: "Wouldn't it be cool if agents could manage their own context?"
    thinking_time: 1.8
    typing_speed: 0.02
    camera:
      zoom: 2.0
      x: 0.2
      auto_y: true
      at: "user_start"
      duration: 1.0
      ease: "ease-in-out"
    response: |
      Yeah! How else can you do advanced automation?
    post_pause: 0.6

  - user: "Why can't they prompt themselves upon completion?"
    thinking_time: 1.8
    typing_speed: 0.02
    camera:
      zoom: 2.2
      x: 0.2
      auto_y: true
      at: "user_start"
      duration: 1.0
      ease: "ease-in-out"
    response: |
      We could generate a prompt to push them forward based on their context...
    post_pause: 0.6

  - user: "And what if they can switch models?"
    thinking_time: 1.8
    typing_speed: 0.02
    camera:
      zoom: 2.4
      x: 0.2
      auto_y: true
      at: "user_start"
      duration: 1.0
      ease: "ease-in-out"
    response: |
      Then it could use the right model for each task?
    post_pause: 0.6

  - user: "And a harness could use all these capabilities?"
    thinking_time: 1.8
    typing_speed: 0.02
    camera:
      zoom: 2.6
      x: 0.18
      auto_y: true
      at: "user_start"
      duration: 1.0
      ease: "ease-in-out"
    response: |
      It could allow for advanced agent automation!
    post_pause: 0.6

  # ── Exchange 5: The reveal — big zoom ──────────────────
  - user: "Can Hermes Agent do this?"
    thinking_time: 4.0
    typing_speed: 0.02
    pre_pause: 0.1
    camera:
      zoom: 3.0
      x: 0.05
      auto_y: true
      at: "user_start"
      duration: 1.0
      ease: "ease-in-out"
    camera_response:
      zoom: 3.5
      x: 0.05
      auto_y: true
      at: "response_start"
      duration: 4.0
      ease: "ease-in-out"
    response: "It can now."
    post_pause: 3.0

  # ── Hold and zoom out ──────────────────────────────────
  - action: camera
    zoom: 1.0
    duration: 1.5
    ease: "ease-out"

  - action: pause
    duration: 2.0
